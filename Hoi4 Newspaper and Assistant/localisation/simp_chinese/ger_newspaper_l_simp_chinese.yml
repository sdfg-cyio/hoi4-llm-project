 domestic_3_title:0 "慕尼黑叛军占领仅六小时即集体投降 原因竟是啤酒供应断绝"
 domestic_3_body:0 "巴伐利亚流传一则令人啼笑皆非的逸闻。盘踞慕尼黑的武装叛匪在控制国家社会主义啤酒馆后，惊觉酒窖已被警惕的党卫队提前清空。据悉，叛军头目当场对沮丧的部众宣称：“没有啤酒的起义毫无巴伐利亚灵魂。”随后，百余名暴徒列队步行至最近的警察局，主动缴械自首。一名被捕者供述：“我们原以为占领慕尼黑就能接管所有啤酒厂，万万没料到元首早已洞察一切。”帝国宣传部门指出，此类缺乏意志的行径，恰恰暴露了国际马克思主义腐朽透顶的本质。"
